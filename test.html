<!DOCTYPE html>
<html>
<head>
    <title>Test - QA Layer Clickable</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-box { 
            width: 300px; 
            height: 100px; 
            background: #fee2e2; 
            border: 2px solid #ef4444; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            margin: 20px 0;
            position: relative;
        }
        .test-box:hover { background: #fecaca; }
        .indicator { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            width: 16px; 
            height: 16px; 
            background: #ef4444; 
            border-radius: 50%; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            font-weight: bold;
        }
        .result { 
            padding: 10px; 
            background: #f0f9ff; 
            border: 1px solid #0ea5e9; 
            border-radius: 6px; 
            margin: 10px 0; 
            display: none;
        }
    </style>
</head>
<body>
    <h1>QA Layer Click Test</h1>
    <p>This tests if the QA layer click functionality works:</p>
    
    <div class="test-box" onclick="showResult()">
        <span>Click me - QA & Testing Layer</span>
        <div class="indicator">?</div>
    </div>
    
    <div id="result" class="result">
        ✅ <strong>QA Layer Clicked!</strong><br>
        This confirms the click functionality is working.
    </div>
    
    <p><a href="index.html">← Back to Main App</a></p>
    
    <script>
        function showResult() {
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
