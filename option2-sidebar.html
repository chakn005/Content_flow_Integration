<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 2: Continuous Testing Sidebar - E2E Integration Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --disney-blue: #0A2A66;
      --disney-blue-soft: #E8F0FA;
    }
    .brand-icon { background: var(--disney-blue); }
    .header { background: rgba(232, 240, 250, 0.95); border-bottom: 1px solid rgba(10, 42, 102, 0.12); }
    .header::after { content: ""; display: block; height: 3px; background: linear-gradient(to right, var(--disney-blue), #1F80E0, #3B82F6); }
    
    /* Option 2 Specific Styles */
    .qa-sidebar { fill: #F8FAFC; stroke: #64748B; stroke-width: 2; }
    .qa-activity { fill: #EFF6FF; stroke: #3B82F6; stroke-width: 1; }
    .validation-point { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 1; }
    .feedback-line { stroke: #EF4444; stroke-width: 2; stroke-dasharray: 6,3; }
    .monitoring-line { stroke: #10B981; stroke-width: 1; stroke-dasharray: 2,2; }
  </style>
</head>
<body>
<div class="app">
  <header class="header" role="banner">
    <div class="header-container">
      <div class="header-brand">
        <div class="brand-icon" style="background: transparent; box-shadow: none;">
          <svg width="40" height="32" viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="28" r="14" fill="#0A2A66"/>
            <circle cx="18" cy="14" r="10" fill="#0A2A66"/>
            <circle cx="46" cy="14" r="10" fill="#0A2A66"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Option 2: Continuous Testing Sidebar</h1>
          <p class="brand-subtitle">Parallel QA activities with continuous monitoring</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="diagram-section">
      <div class="diagram-header">
        <h2>Option 2: Continuous Testing Sidebar</h2>
        <p class="diagram-description">QA activities run parallel to main flow with continuous validation</p>
      </div>

      <div class="diagram-container">
        <svg viewBox="0 0 1400 800" aria-label="Continuous testing sidebar flow">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
            </marker>
            <marker id="feedbackArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#EF4444" />
            </marker>
            <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
            </filter>
          </defs>

          <!-- QA Sidebar -->
          <rect x="50" y="50" width="200" height="650" rx="12" class="qa-sidebar" filter="url(#dropshadow)"/>
          <text x="150" y="80" class="phase-title">QA Activities</text>
          
          <!-- QA Activity Boxes -->
          <rect x="70" y="100" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="125" class="step-text" style="font-size: 12px;">Unit Tests</text>
          <text x="150" y="140" class="detail-text" style="font-size: 10px;">Component validation</text>
          
          <rect x="70" y="180" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="205" class="step-text" style="font-size: 12px;">Integration Tests</text>
          <text x="150" y="220" class="detail-text" style="font-size: 10px;">API & service contracts</text>
          
          <rect x="70" y="260" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="285" class="step-text" style="font-size: 12px;">E2E Tests</text>
          <text x="150" y="300" class="detail-text" style="font-size: 10px;">Full user journeys</text>
          
          <rect x="70" y="340" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="365" class="step-text" style="font-size: 12px;">Performance</text>
          <text x="150" y="380" class="detail-text" style="font-size: 10px;">Load & stress testing</text>
          
          <rect x="70" y="420" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="445" class="step-text" style="font-size: 12px;">Security</text>
          <text x="150" y="460" class="detail-text" style="font-size: 10px;">Vulnerability scans</text>
          
          <rect x="70" y="500" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="525" class="step-text" style="font-size: 12px;">Monitoring</text>
          <text x="150" y="540" class="detail-text" style="font-size: 10px;">Real-time metrics</text>
          
          <rect x="70" y="580" width="160" height="60" rx="8" class="qa-activity"/>
          <text x="150" y="605" class="step-text" style="font-size: 12px;">Regression</text>
          <text x="150" y="620" class="detail-text" style="font-size: 10px;">Automated suites</text>

          <!-- Main Flow Phases -->
          <!-- Content Platform -->
          <rect x="300" y="150" width="220" height="120" rx="12" class="phase-box content-platform" filter="url(#dropshadow)"/>
          <text x="410" y="180" class="phase-title">Content Platform</text>
          <text x="410" y="205" class="step-text">Content Ingestion</text>
          <text x="410" y="225" class="step-text">Metadata Creation</text>
          <text x="410" y="245" class="step-text">Asset Processing</text>

          <!-- Media Platform -->
          <rect x="570" y="150" width="220" height="120" rx="12" class="phase-box media-platform" filter="url(#dropshadow)"/>
          <text x="680" y="180" class="phase-title">Media Platform</text>
          <text x="680" y="205" class="step-text">Transformation</text>
          <text x="680" y="225" class="step-text">Encoding</text>
          <text x="680" y="245" class="step-text">DRM Application</text>

          <!-- Data Layer -->
          <rect x="840" y="150" width="220" height="120" rx="12" class="phase-box data-layer" filter="url(#dropshadow)"/>
          <text x="950" y="180" class="phase-title">Data Layer</text>
          <text x="950" y="205" class="step-text">Aggregation</text>
          <text x="950" y="225" class="step-text">Catalog Sync</text>
          <text x="950" y="245" class="step-text">API Gateway</text>

          <!-- Streaming -->
          <rect x="1110" y="150" width="220" height="120" rx="12" class="phase-box streaming" filter="url(#dropshadow)"/>
          <text x="1220" y="180" class="phase-title">Streaming</text>
          <text x="1220" y="205" class="step-text">Discovery</text>
          <text x="1220" y="225" class="step-text">Playback</text>
          <text x="1220" y="245" class="step-text">Analytics</text>

          <!-- Flow Arrows -->
          <line x1="520" y1="210" x2="570" y2="210" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="790" y1="210" x2="840" y2="210" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="1060" y1="210" x2="1110" y2="210" class="flow-arrow" marker-end="url(#arrowhead)"/>

          <!-- Validation Points -->
          <circle cx="410" cy="320" r="15" class="validation-point"/>
          <text x="410" y="325" class="detail-text" style="font-size: 10px; text-anchor: middle;">V1</text>
          
          <circle cx="680" cy="320" r="15" class="validation-point"/>
          <text x="680" y="325" class="detail-text" style="font-size: 10px; text-anchor: middle;">V2</text>
          
          <circle cx="950" cy="320" r="15" class="validation-point"/>
          <text x="950" y="325" class="detail-text" style="font-size: 10px; text-anchor: middle;">V3</text>
          
          <circle cx="1220" cy="320" r="15" class="validation-point"/>
          <text x="1220" y="325" class="detail-text" style="font-size: 10px; text-anchor: middle;">V4</text>

          <!-- Connections from phases to validation points -->
          <line x1="410" y1="270" x2="410" y2="305" class="test-connection"/>
          <line x1="680" y1="270" x2="680" y2="305" class="test-connection"/>
          <line x1="950" y1="270" x2="950" y2="305" class="test-connection"/>
          <line x1="1220" y1="270" x2="1220" y2="305" class="test-connection"/>

          <!-- QA Monitoring Lines -->
          <line x1="250" y1="130" x2="410" y2="150" class="monitoring-line"/>
          <line x1="250" y1="210" x2="680" y2="150" class="monitoring-line"/>
          <line x1="250" y1="290" x2="950" y2="150" class="monitoring-line"/>
          <line x1="250" y1="370" x2="1220" y2="150" class="monitoring-line"/>

          <!-- Feedback Lines -->
          <line x1="410" y1="335" x2="230" y2="180" class="feedback-line" marker-end="url(#feedbackArrow)"/>
          <line x1="680" y1="335" x2="230" y2="260" class="feedback-line" marker-end="url(#feedbackArrow)"/>
          <line x1="950" y1="335" x2="230" y2="340" class="feedback-line" marker-end="url(#feedbackArrow)"/>
          <line x1="1220" y1="335" x2="230" y2="420" class="feedback-line" marker-end="url(#feedbackArrow)"/>

          <!-- Continuous Feedback Loop -->
          <rect x="300" y="400" width="1030" height="80" rx="8" class="integration-hub" filter="url(#dropshadow)"/>
          <text x="815" y="430" class="phase-title">Continuous Feedback Loop</text>
          <text x="815" y="450" class="step-text">Real-time Quality Metrics • Automated Alerts • Performance Dashboards</text>
          <text x="815" y="465" class="step-text">Defect Tracking • Test Coverage • Release Readiness</text>

        </svg>
      </div>
    </div>
  </main>
</div>
</body>
</html>
