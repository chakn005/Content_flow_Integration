<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option F: Bridge Connectors - Connection Styles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root { --disney-blue: #0A2A66; --disney-blue-soft: #E8F0FA; }
    .brand-icon { background: var(--disney-blue); }
    .header { background: rgba(232, 240, 250, 0.95); border-bottom: 1px solid rgba(10, 42, 102, 0.12); }
    .header::after { content: ""; display: block; height: 3px; background: linear-gradient(to right, var(--disney-blue), #1F80E0, #3B82F6); }
    .phase-testing { fill: #F0F9FF; stroke: #0EA5E9; stroke-width: 2; }
    .integration-hub { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; }
    .bridge { fill: #E5E7EB; stroke: #6B7280; stroke-width: 2; }
    .bridge-support { stroke: #6B7280; stroke-width: 3; }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-container">
      <div class="header-brand">
        <div class="brand-icon" style="background: transparent; box-shadow: none;">
          <svg width="40" height="32" viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="28" r="14" fill="#0A2A66"/>
            <circle cx="18" cy="14" r="10" fill="#0A2A66"/>
            <circle cx="46" cy="14" r="10" fill="#0A2A66"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Option F: Bridge Connectors</h1>
          <p class="brand-subtitle">Architectural bridges connecting blocks</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="diagram-section">
      <div class="diagram-container">
        <svg viewBox="0 0 1400 650" aria-label="Bridge connectors style">
          <defs>
            <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
            </filter>
          </defs>

          <!-- Main Phases Row -->
          <rect x="50" y="50" width="250" height="120" rx="12" class="phase-box content-platform" filter="url(#dropshadow)"/>
          <text x="175" y="110" class="phase-title">Content Platform</text>

          <rect x="350" y="50" width="250" height="120" rx="12" class="phase-box media-platform" filter="url(#dropshadow)"/>
          <text x="475" y="110" class="phase-title">Media Platform</text>

          <rect x="650" y="50" width="250" height="120" rx="12" class="phase-box data-layer" filter="url(#dropshadow)"/>
          <text x="775" y="110" class="phase-title">Data Layer</text>

          <rect x="950" y="50" width="250" height="120" rx="12" class="phase-box streaming" filter="url(#dropshadow)"/>
          <text x="1075" y="110" class="phase-title">Streaming/Client</text>

          <!-- Bridge Connectors: Phases to Integration -->
          <!-- Bridge 1 -->
          <path d="M 175 170 Q 175 190 300 200 Q 425 210 450 220" class="bridge" filter="url(#dropshadow)"/>
          <line x1="175" y1="170" x2="175" y2="185" class="bridge-support"/>
          <line x1="300" y1="200" x2="300" y2="215" class="bridge-support"/>
          <line x1="450" y1="220" x2="450" y2="235" class="bridge-support"/>

          <!-- Bridge 2 -->
          <path d="M 475 170 Q 475 190 512 200 Q 537 210 550 220" class="bridge" filter="url(#dropshadow)"/>
          <line x1="475" y1="170" x2="475" y2="185" class="bridge-support"/>
          <line x1="550" y1="220" x2="550" y2="235" class="bridge-support"/>

          <!-- Bridge 3 -->
          <path d="M 775 170 Q 775 190 812 200 Q 837 210 850 220" class="bridge" filter="url(#dropshadow)"/>
          <line x1="775" y1="170" x2="775" y2="185" class="bridge-support"/>
          <line x1="850" y1="220" x2="850" y2="235" class="bridge-support"/>

          <!-- Bridge 4 -->
          <path d="M 1075 170 Q 1075 190 1012 200 Q 975 210 950 220" class="bridge" filter="url(#dropshadow)"/>
          <line x1="1075" y1="170" x2="1075" y2="185" class="bridge-support"/>
          <line x1="1012" y1="200" x2="1012" y2="215" class="bridge-support"/>
          <line x1="950" y1="220" x2="950" y2="235" class="bridge-support"/>

          <!-- Integration Testing -->
          <a href="https://jira.disney.com/browse/CPTR-68465" target="_blank" rel="noopener noreferrer">
            <rect x="400" y="220" width="600" height="100" rx="12" class="integration-hub" filter="url(#dropshadow)" style="cursor: pointer;"/>
            <text x="700" y="250" class="phase-title" style="cursor: pointer;">Integration Testing</text>
            <text x="700" y="275" class="step-text" style="cursor: pointer;">Cross-Phase Contract Testing • API Integration • Data Flow Validation</text>
            <text x="700" y="295" class="step-text" style="cursor: pointer;">Performance Testing • Security Validation • Compatibility Checks</text>
          </a>

          <!-- Bridge Connectors: Integration to Phase Tests -->
          <!-- Bridge 5 -->
          <path d="M 450 320 Q 450 340 312 350 Q 225 360 175 370" class="bridge" filter="url(#dropshadow)"/>
          <line x1="450" y1="320" x2="450" y2="335" class="bridge-support"/>
          <line x1="312" y1="350" x2="312" y2="365" class="bridge-support"/>
          <line x1="175" y1="370" x2="175" y2="385" class="bridge-support"/>

          <!-- Bridge 6 -->
          <path d="M 550 320 Q 550 340 512 350 Q 487 360 475 370" class="bridge" filter="url(#dropshadow)"/>
          <line x1="550" y1="320" x2="550" y2="335" class="bridge-support"/>
          <line x1="475" y1="370" x2="475" y2="385" class="bridge-support"/>

          <!-- Bridge 7 -->
          <path d="M 850 320 Q 850 340 812 350 Q 787 360 775 370" class="bridge" filter="url(#dropshadow)"/>
          <line x1="850" y1="320" x2="850" y2="335" class="bridge-support"/>
          <line x1="775" y1="370" x2="775" y2="385" class="bridge-support"/>

          <!-- Bridge 8 -->
          <path d="M 950 320 Q 950 340 1012 350 Q 1050 360 1075 370" class="bridge" filter="url(#dropshadow)"/>
          <line x1="950" y1="320" x2="950" y2="335" class="bridge-support"/>
          <line x1="1012" y1="350" x2="1012" y2="365" class="bridge-support"/>
          <line x1="1075" y1="370" x2="1075" y2="385" class="bridge-support"/>

          <!-- Phase Testing Boxes -->
          <rect x="50" y="370" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="175" y="395" class="phase-title" style="font-size: 14px;">Content Tests</text>
          <text x="175" y="415" class="step-text" style="font-size: 11px;">• Format Validation</text>
          <text x="175" y="430" class="step-text" style="font-size: 11px;">• Metadata Integrity</text>

          <rect x="350" y="370" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="475" y="395" class="phase-title" style="font-size: 14px;">Media Tests</text>
          <text x="475" y="415" class="step-text" style="font-size: 11px;">• Encoding Quality</text>
          <text x="475" y="430" class="step-text" style="font-size: 11px;">• DRM Validation</text>

          <rect x="650" y="370" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="775" y="395" class="phase-title" style="font-size: 14px;">Data Tests</text>
          <text x="775" y="415" class="step-text" style="font-size: 11px;">• API Contract</text>
          <text x="775" y="430" class="step-text" style="font-size: 11px;">• Catalog Sync</text>

          <rect x="950" y="370" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="1075" y="395" class="phase-title" style="font-size: 14px;">Streaming Tests</text>
          <text x="1075" y="415" class="step-text" style="font-size: 11px;">• Playback Quality</text>
          <text x="1075" y="430" class="step-text" style="font-size: 11px;">• Discovery UX</text>

          <!-- Horizontal bridge connections between phase tests -->
          <path d="M 300 410 Q 325 405 350 410" class="bridge" filter="url(#dropshadow)"/>
          <line x1="325" y1="405" x2="325" y2="415" class="bridge-support"/>

          <path d="M 600 410 Q 625 405 650 410" class="bridge" filter="url(#dropshadow)"/>
          <line x1="625" y1="405" x2="625" y2="415" class="bridge-support"/>

          <path d="M 900 410 Q 925 405 950 410" class="bridge" filter="url(#dropshadow)"/>
          <line x1="925" y1="405" x2="925" y2="415" class="bridge-support"/>

        </svg>
      </div>
    </div>
  </main>
</div>
</body>
</html>
