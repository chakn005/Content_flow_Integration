<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 1: Integrated Phase Testing - E2E Integration Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --disney-blue: #0A2A66;
      --disney-blue-soft: #E8F0FA;
    }
    .brand-icon { background: var(--disney-blue); }
    .header { background: rgba(232, 240, 250, 0.95); border-bottom: 1px solid rgba(10, 42, 102, 0.12); }
    .header::after { content: ""; display: block; height: 3px; background: linear-gradient(to right, var(--disney-blue), #1F80E0, #3B82F6); }
    
    /* Option 1 Specific Styles */
    .phase-testing { fill: #F0F9FF; stroke: #0EA5E9; stroke-width: 2; }
    .integration-hub { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; }
    .e2e-validation { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; }
    .test-connection { stroke: #6B7280; stroke-width: 2; stroke-dasharray: 4,4; }
  </style>
</head>
<body>
<div class="app">
  <header class="header" role="banner">
    <div class="header-container">
      <div class="header-brand">
        <div class="brand-icon" style="background: transparent; box-shadow: none;">
          <svg width="40" height="32" viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="28" r="14" fill="#0A2A66"/>
            <circle cx="18" cy="14" r="10" fill="#0A2A66"/>
            <circle cx="46" cy="14" r="10" fill="#0A2A66"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Option 1: Integrated Phase Testing</h1>
          <p class="brand-subtitle">Phase-specific testing with integration hub</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="diagram-section">
      <div class="diagram-header">
        <h2>Option 1: Integrated Phase Testing</h2>
        <p class="diagram-description">Each phase has dedicated testing, feeding into integration hub</p>
      </div>

      <div class="diagram-container">
        <svg viewBox="0 0 1400 900" aria-label="Integrated phase testing flow">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
            </marker>
            <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
            </filter>
          </defs>

          <!-- Main Phases Row -->
          <!-- Content Platform -->
          <g class="phase">
            <rect x="50" y="50" width="250" height="150" rx="12" class="phase-box content-platform" filter="url(#dropshadow)"/>
            <text x="175" y="80" class="phase-title">Content Platform</text>
            <text x="175" y="105" class="step-text">Content Ingestion</text>
            <text x="175" y="125" class="step-text">Metadata Creation</text>
            <text x="175" y="145" class="step-text">Asset Processing</text>
            <text x="175" y="170" class="detail-text">Assets, Rights, Localization</text>
          </g>

          <!-- Media Platform -->
          <g class="phase">
            <rect x="350" y="50" width="250" height="150" rx="12" class="phase-box media-platform" filter="url(#dropshadow)"/>
            <text x="475" y="80" class="phase-title">Media Platform</text>
            <text x="475" y="105" class="step-text">Content Transformation</text>
            <text x="475" y="125" class="step-text">Encoding &amp; Packaging</text>
            <text x="475" y="145" class="step-text">DRM Application</text>
            <text x="475" y="170" class="detail-text">ABR, Subtitles, Audio</text>
          </g>

          <!-- Data Layer -->
          <g class="phase">
            <rect x="650" y="50" width="250" height="150" rx="12" class="phase-box data-layer" filter="url(#dropshadow)"/>
            <text x="775" y="80" class="phase-title">Data Layer</text>
            <text x="775" y="105" class="step-text">Data Aggregation</text>
            <text x="775" y="125" class="step-text">Catalog Sync</text>
            <text x="775" y="145" class="step-text">API Gateway</text>
            <text x="775" y="170" class="detail-text">Search, Recommendations</text>
          </g>

          <!-- Streaming -->
          <g class="phase">
            <rect x="950" y="50" width="250" height="150" rx="12" class="phase-box streaming" filter="url(#dropshadow)"/>
            <text x="1075" y="80" class="phase-title">Streaming/Client</text>
            <text x="1075" y="105" class="step-text">Content Discovery</text>
            <text x="1075" y="125" class="step-text">Playback Engine</text>
            <text x="1075" y="145" class="step-text">Analytics</text>
            <text x="1075" y="170" class="detail-text">Multi-device, CDN</text>
          </g>

          <!-- Flow Arrows -->
          <!-- Removed arrows between 1st row blocks -->

          <!-- Integration Testing (2nd Row) -->
          <a href="https://jira.disney.com/browse/CPTR-68465" target="_blank" rel="noopener noreferrer">
            <rect x="400" y="250" width="600" height="100" rx="12" class="integration-hub" filter="url(#dropshadow)" style="cursor: pointer;"/>
            <text x="700" y="280" class="phase-title" style="cursor: pointer;">Integration Testing</text>
            <text x="700" y="305" class="step-text" style="cursor: pointer;">Cross-Phase Contract Testing • API Integration • Data Flow Validation</text>
            <text x="700" y="325" class="step-text" style="cursor: pointer;">Performance Testing • Security Validation • Compatibility Checks</text>
          </a>

          <!-- Connections from phases to Integration Hub -->
          <line x1="175" y1="200" x2="450" y2="250" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="475" y1="200" x2="550" y2="250" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="775" y1="200" x2="850" y2="250" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="1075" y1="200" x2="950" y2="250" class="flow-arrow" marker-end="url(#arrowhead)"/>

          <!-- Phase Testing Boxes (3rd Row) -->
          <!-- Content Tests -->
          <rect x="50" y="400" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="175" y="425" class="phase-title" style="font-size: 14px;">Content Tests</text>
          <text x="175" y="445" class="step-text" style="font-size: 11px;">• Format Validation</text>
          <text x="175" y="460" class="step-text" style="font-size: 11px;">• Metadata Integrity</text>
          <text x="175" y="475" class="step-text" style="font-size: 11px;">• Rights Verification</text>

          <!-- Media Tests -->
          <rect x="350" y="400" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="475" y="425" class="phase-title" style="font-size: 14px;">Media Tests</text>
          <text x="475" y="445" class="step-text" style="font-size: 11px;">• Encoding Quality</text>
          <text x="475" y="460" class="step-text" style="font-size: 11px;">• DRM Validation</text>
          <text x="475" y="475" class="step-text" style="font-size: 11px;">• Package Integrity</text>

          <!-- Data Tests -->
          <rect x="650" y="400" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="775" y="425" class="phase-title" style="font-size: 14px;">Data Tests</text>
          <text x="775" y="445" class="step-text" style="font-size: 11px;">• API Contract</text>
          <text x="775" y="460" class="step-text" style="font-size: 11px;">�� Catalog Sync</text>
          <text x="775" y="475" class="step-text" style="font-size: 11px;">• Search Index</text>

          <!-- Streaming Tests -->
          <rect x="950" y="400" width="250" height="80" rx="8" class="phase-testing" filter="url(#dropshadow)"/>
          <text x="1075" y="425" class="phase-title" style="font-size: 14px;">Streaming Tests</text>
          <text x="1075" y="445" class="step-text" style="font-size: 11px;">• Playback Quality</text>
          <text x="1075" y="460" class="step-text" style="font-size: 11px;">• Discovery UX</text>
          <text x="1075" y="475" class="step-text" style="font-size: 11px;">• Performance</text>

          <!-- Connections from Integration Hub to phase tests -->
          <line x1="450" y1="350" x2="175" y2="400" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="550" y1="350" x2="475" y2="400" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="850" y1="350" x2="775" y2="400" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="950" y1="350" x2="1075" y2="400" class="flow-arrow" marker-end="url(#arrowhead)"/>

          <!-- Arrows between 3rd row blocks (phase tests) -->
          <line x1="300" y1="440" x2="350" y2="440" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="600" y1="440" x2="650" y2="440" class="flow-arrow" marker-end="url(#arrowhead)"/>
          <line x1="900" y1="440" x2="950" y2="440" class="flow-arrow" marker-end="url(#arrowhead)"/>

        </svg>
      </div>
    </div>
  </main>
</div>
</body>
</html>
